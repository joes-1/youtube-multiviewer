<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mumbai YouTube MV</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  

  <style>
  .brand-logo
	{
  height: 80px; /* Adjust this to make the logo bigger or smaller */
  width: auto;
  border-radius: 4px; /* Optional: smooths the corners if the logo is square */
  display: block;
	}
    :root{
      --bg:#0b1020;
      --panel:#101a33;
      --card:#0f172a;
      --border:rgba(255,255,255,.10);
      --text:#e5e7eb;
      --muted:#9ca3af;
      --btn:#1f2a4a;
      --btnHover:#2a3a66;
      --radius:14px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Arial,sans-serif;
      background:linear-gradient(180deg,#070b16 0%, #0b1020 55%, #070b16 100%);
      color:var(--text);
    }
    header{
      position:sticky; top:0; z-index:50;
      background:rgba(11,16,32,.92);
      backdrop-filter: blur(10px);
      border-bottom:1px solid var(--border);
    }
    .wrap{max-width:1400px; margin:0 auto; padding:14px 14px;}
    .row{display:flex; gap:12px; align-items:stretch; flex-wrap:wrap;}
    .panel{
      flex:1 1 520px;
      background:rgba(16,26,51,.65);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:12px 16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap: 10px;
    }
    .panel h1{margin:0; font-size:16px; letter-spacing:.2px; display:flex; align-items:center; gap:8px;}
    .header-controls { display: flex; align-items: center; gap: 12px; }
    .status{font-size:12px; color:var(--muted);}

    main .wrap{padding-top:16px; padding-bottom:18px;}

    /* dynamic grid via CSS variable */
    .grid{
      display:grid;
      grid-template-columns: repeat(var(--cols,3), minmax(0,1fr));
      gap:10px;
    }
    
    @media(max-width:900px){.grid{grid-template-columns:repeat(2,minmax(0,1fr));}}
    
    /* Mobile-specific adjustments */
    @media(max-width:600px){
      .grid{grid-template-columns:1fr;}
      .fsBtn{display:none !important;} /* Hides maximize button on mobile */
    }

    .tile{
      background:rgba(15,23,42,.65);
      border:1px solid var(--border);
      border-radius:var(--radius);
      overflow:hidden;
      position:relative;
      display:flex;
      flex-direction:column;
    }
    .tileBar{
      display:flex; align-items:center; gap:6px;
      padding:6px 8px;
      border-bottom:1px solid var(--border);
      background:rgba(8,12,22,.65);
      flex-shrink:0;
    }
    .badge{
      font-size:11px;
      color:var(--muted);
      padding:3px 7px;
      border-radius:999px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.04);
      white-space:nowrap;
      max-width:180px;
      overflow:hidden;
      text-overflow:ellipsis;
      font-weight: 600;
    }
    .tileBar .spacer{margin-left:auto;}
    
    .miniBtn, .actionBtn{
      border-radius:8px;
      font-weight:700;
      background:var(--btn);
      color:var(--text);
      border:1px solid var(--border);
      cursor:pointer;
      transition: .15s ease;
    }
    .miniBtn { padding:5px 9px; font-size:11px; flex-shrink:0; }
    .actionBtn { padding:8px 14px; font-size:13px; }
    .miniBtn:hover, .actionBtn:hover{background:var(--btnHover);}
    
    .player{
      aspect-ratio:16/9;
      width:100%;
      background:#000;
      position:relative;
      flex-shrink:0;
    }
    iframe{
      width:100%;
      height:100%;
      border:0;
      display:block;
    }
    .empty{
      display:flex;
      align-items:center;
      justify-content:center;
      height:100%;
      color:var(--muted);
      font-size:12px;
      padding:16px;
      text-align:center;
    }

    .tile:fullscreen .tileBar{display:flex;}
    .tile:fullscreen .player{aspect-ratio:unset; height:calc(100vh - 36px);}

    footer{
      color:var(--muted);
      font-size:12px;
      padding:14px;
      text-align:center;
      border-top:1px solid var(--border);
      background:rgba(11,16,32,.55);
    }
  </style>
</head>

  function extractVideoId(input){
    try{
      if(/^[a-zA-Z0-9_-]{11}$/.test(input.trim())) return input.trim();
      const url = new URL(input.trim());
      if(url.hostname.includes("youtu.be")){
        const id = url.pathname.split("/").filter(Boolean)[0];
        if(id) return id;
      }
      if(url.searchParams.has("v")){
        const id = url.searchParams.get("v");
        if(id) return id;
      }
      const parts = url.pathname.split("/").filter(Boolean);
      for(const kw of ["live","embed","shorts"]){
        const idx = parts.indexOf(kw);
        if(idx !== -1 && parts[idx+1]) return parts[idx+1];
      }
      return null;
    }catch(e){ return null; }
  }

  function buildEmbedUrl(videoId){
    const origin = location.origin !== "null" ? location.origin : "https://www.youtube.com";

      mute:            "1", 
      playsinline:     "1",
      rel:             "0",
      modestbranding:  "1",
      iv_load_policy:  "3",
      enablejsapi:     "1", 
      origin:          origin,
    });
    return `https://www.youtube.com/embed/${videoId}?${params.toString()}`;
  }

    reloadBtn.disabled = !vid;
    reloadBtn.onclick = () => {
      const iframe = tile.querySelector("iframe");
      if(iframe){ const s = iframe.src; iframe.src=""; iframe.src=s; }
    };

    // Individual Mute/Unmute Button
    const muteBtn = document.createElement("button");
    muteBtn.className = "miniBtn indiv-mute-btn";
    muteBtn.dataset.muted = "true"; // Start muted
    muteBtn.textContent = "🔇";
    muteBtn.title = "Unmute stream";
    muteBtn.disabled = !vid;
    muteBtn.onclick = () => {
      const isCurrentlyMuted = muteBtn.dataset.muted === "true";
      const willBeMuted = !isCurrentlyMuted;
      
      muteBtn.dataset.muted = willBeMuted;
      muteBtn.textContent = willBeMuted ? "🔇" : "🔊";
      muteBtn.title = willBeMuted ? "Unmute stream" : "Mute stream";
      
      const iframe = tile.querySelector("iframe");
      if(iframe && iframe.contentWindow){
        iframe.contentWindow.postMessage(JSON.stringify({
          "event": "command",
          "func": willBeMuted ? "mute" : "unMute",
          "args": []
        }), "*");
      }
    };

    const openBtn = document.createElement("button");
    openBtn.className = "miniBtn";
    openBtn.textContent = "↗";
    openBtn.title = "Open in YouTube";
    openBtn.disabled = !rawUrl;
    openBtn.onclick = () => rawUrl && window.open((rawUrl.includes('http') ? rawUrl : `https://youtube.com/watch?v=${rawUrl}`),"_blank","noopener,noreferrer");

    // Fullscreen button with the special 'fsBtn' class for mobile hiding
    const fsBtn = document.createElement("button");
    fsBtn.className = "miniBtn fsBtn"; 
    fsBtn.textContent = "⛶";
    fsBtn.title = "Fullscreen";
    fsBtn.onclick = async () => {
      try{
        if(!document.fullscreenElement) await tile.requestFullscreen();
        else await document.exitFullscreen();
      }catch(e){}
    };

    bar.append(badge, spacer, muteBtn, reloadBtn, openBtn, fsBtn);

    /* player */
    const player = document.createElement("div");
    player.className = "player";

    if(!vid){
      badge.textContent = `Invalid URL`;
      player.innerHTML = `<div class="empty">Could not parse video ID from:<br><span style="word-break:break-all;font-size:11px;opacity:.7">${rawUrl}</span></div>`;
    } else {
      const iframe = document.createElement("iframe");
      iframe.src = buildEmbedUrl(vid);
      iframe.allow = "autoplay; fullscreen; picture-in-picture; encrypted-media";
      iframe.allowFullscreen = true;
      iframe.loading = "lazy";
      iframe.referrerPolicy = "origin"; 
      player.appendChild(iframe);
    }

    tile.append(bar, player);
    return tile;
  }

  function render(){
    $grid.innerHTML = "";
    
    const count = STREAMS.length;
    let cols = 1;
    if (count > 0) {
      cols = Math.ceil(Math.sqrt(count)); 
    }
    
    $grid.style.setProperty("--cols", cols);

    for(let i=0; i<count; i++){
      $grid.appendChild(tileTemplate(STREAMS[i]));
    }

    $status.textContent = `Monitoring ${count} stream(s)`;
  }

  // Handle Mute/Unmute All + Sync individual buttons
  $muteAllBtn.addEventListener("click", () => {
    isAllMuted = !isAllMuted;
    $muteAllBtn.textContent = isAllMuted ? "🔊 Unmute All" : "🔇 Mute All";
    
    document.querySelectorAll('.tile').forEach(tile => {
      const iframe = tile.querySelector("iframe");
      const mBtn = tile.querySelector(".indiv-mute-btn");
      
      if (mBtn) {
        mBtn.dataset.muted = isAllMuted;
        mBtn.textContent = isAllMuted ? "🔇" : "🔊";
        mBtn.title = isAllMuted ? "Unmute stream" : "Mute stream";
      }

      if (iframe && iframe.contentWindow) {
        iframe.contentWindow.postMessage(JSON.stringify({
          "event": "command",
          "func": isAllMuted ? "mute" : "unMute",
          "args": []
        }), "*");
      }
    });
  });

  render();
</script>
</body>
</html>
